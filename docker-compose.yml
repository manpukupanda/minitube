# ------------------------------------------------------------
# minitube - 最小構成の動画配信アプリ
#
# コンテナ構成：
#   db     ... PostgreSQL（動画メタ情報・ジョブ情報の永続化）
#   redis  ... Redis（split ジョブキュー）
#   api    ... FastAPI（認証・アップロード・署名URL生成・ジョブ状態参照）
#   worker ... Worker（Redis Queue 監視・ffmpeg HLS 変換）
#   nginx  ... Nginx（HLS 配信 + secure_link_md5 署名検証）
#
# /videos ディレクトリを api/worker/nginx コンテナで共有し、
# API が受け取った mp4 を Worker が ffmpeg で HLS に変換して
# Nginx が直接配信する。
# 動画メタ情報とジョブ情報は PostgreSQL（db コンテナ）に保存し、
# Alembic でスキーマを管理する。
#
# SECRET_KEY の設定方法：
#   起動前に .env.example をコピーして .env を作成し、各値を設定する。
#   例: cp .env.example .env
# ------------------------------------------------------------

services:
  # ----------------------------------------------------------
  # PostgreSQL コンテナ
  # 動画メタ情報（id, title, created_at）と
  # ジョブ情報（id, video_id, type, status 等）を永続化する。
  # postgres_data ボリュームにデータを保存し、
  # コンテナ再作成後もデータが保持される。
  # ----------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: minitube_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-minitube}
      POSTGRES_USER: ${POSTGRES_USER:-minitube}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_replace_in_production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-minitube}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # Redis コンテナ
  # split ジョブのキューとして使用する。
  # API が job_id を enqueue し、Worker が BLPOP で受け取る。
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: minitube_redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # FastAPI コンテナ
  # ポート 8000 でリッスンし、認証・アップロード・
  # 署名付きURL生成・ジョブ状態参照を担当する。
  # HLS 変換は Worker コンテナに委譲する（ffmpeg は Worker に入れる）。
  # ----------------------------------------------------------
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: minitube_api
    environment:
      # SECRET_KEY は署名付きURL生成と Nginx の secure_link_md5 で共有する。
      # 本番環境では .env ファイルや Docker secrets を使い、
      # この値を変更すること。
      - SECRET_KEY=${SECRET_KEY:-changeme_replace_in_production}
      # ADMIN_PASSWORD は /api/login で使用するパスワード
      # 本番環境では必ず変更すること
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      # DATABASE_URL は PostgreSQL への接続文字列
      # db サービスのホスト名・認証情報と一致させること
      - DATABASE_URL=postgresql://${POSTGRES_USER:-minitube}:${POSTGRES_PASSWORD:-changeme_replace_in_production}@db/${POSTGRES_DB:-minitube}
      # REDIS_URL は Redis への接続文字列
      - REDIS_URL=redis://redis:6379/0
    volumes:
      # /videos を api コンテナにマウントし、アップロードファイルの保存先とする
      - videos_data:/videos
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ----------------------------------------------------------
  # Worker コンテナ
  # Redis Queue を常時監視し、split ジョブを処理する。
  # ffmpeg による HLS 変換を担当する。
  # API コンテナとは別コンテナで動作し、videos_data を共有する。
  # ----------------------------------------------------------
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: minitube_worker
    environment:
      # DATABASE_URL は PostgreSQL への接続文字列
      - DATABASE_URL=postgresql://${POSTGRES_USER:-minitube}:${POSTGRES_PASSWORD:-changeme_replace_in_production}@db/${POSTGRES_DB:-minitube}
      # REDIS_URL は Redis への接続文字列
      - REDIS_URL=redis://redis:6379/0
    volumes:
      # /videos を worker コンテナにもマウントし、HLS 変換の入出力先とする
      - videos_data:/videos
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ----------------------------------------------------------
  # Nginx コンテナ
  # /videos/ 以下の HLS ファイルを secure_link_md5 で保護して配信する。
  # /api/* は FastAPI にリバースプロキシする。
  #
  # nginx.conf は docker-compose 起動時に envsubst で処理され、
  # ${SECRET_KEY} が実際のシークレット値に置換される。
  # ----------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: minitube_nginx
    environment:
      # secure_link_md5 の署名検証に使用する秘密鍵。
      # FastAPI と同じ値を設定する必要がある。
      - SECRET_KEY=${SECRET_KEY:-changeme_replace_in_production}
    volumes:
      # nginx.conf をテンプレートとしてマウントする
      # コンテナ起動時に envsubst で ${SECRET_KEY} を置換してから nginx を起動する
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf.template:ro
      # /videos を nginx コンテナにもマウントし、HLS ファイルを直接配信する
      - videos_data:/videos:ro
    ports:
      - "80:80"
    depends_on:
      - api
    # コンテナ起動時に envsubst で ${SECRET_KEY} を nginx.conf に埋め込んでから起動する
    # '$$SECRET_KEY' の $$ は docker-compose の変数展開を回避するためのエスケープ
    # envsubst に '$$SECRET_KEY' を渡すことで、nginx の $uri, $host 等は置換されない
    command: >
      /bin/sh -c
      "envsubst '$$SECRET_KEY' < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf
      && nginx -g 'daemon off;'"
    restart: unless-stopped

# ----------------------------------------------------------
# ボリューム定義
# videos_data: FastAPI（書き込み）・Worker（読み書き）・Nginx（読み取り）で共有する
# ----------------------------------------------------------
volumes:
  videos_data:
  postgres_data:
