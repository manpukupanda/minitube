# ------------------------------------------------------------
# minitube - 最小構成の動画配信アプリ
#
# コンテナ構成：
#   db             ... PostgreSQL（動画メタ情報・ジョブ情報の永続化）
#   redis          ... Redis（split ジョブキュー）
#   minio          ... MinIO（HLS ファイルの永続保存）
#   createbuckets  ... MinIO バケット初期化（起動時のみ実行）
#   api            ... FastAPI（認証・アップロード・署名URL生成・ジョブ状態参照）
#   worker         ... Worker（Redis Queue 監視・ffmpeg HLS 変換・MinIO アップロード）
#   nginx          ... Nginx（HLS 配信 + secure_link_md5 署名検証 + MinIO proxy_cache）
#
# HLS ファイル（playlist.m3u8 + segment*.ts）は Worker が MinIO に保存する。
# Nginx は secure_link 検証後に MinIO へ直接 proxy_pass して取得・キャッシュする。
# 動画メタ情報とジョブ情報は PostgreSQL（db コンテナ）に保存し、
# Alembic でスキーマを管理する。
#
# SECRET_KEY の設定方法：
#   起動前に .env.example をコピーして .env を作成し、各値を設定する。
#   例: cp .env.example .env
# ------------------------------------------------------------

services:
  # ----------------------------------------------------------
  # PostgreSQL コンテナ
  # 動画メタ情報（id, title, created_at）と
  # ジョブ情報（id, video_id, type, status 等）を永続化する。
  # postgres_data ボリュームにデータを保存し、
  # コンテナ再作成後もデータが保持される。
  # ----------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: minitube_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-minitube}
      POSTGRES_USER: ${POSTGRES_USER:-minitube}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_replace_in_production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-minitube}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # Redis コンテナ
  # split ジョブのキューとして使用する。
  # API が job_id を enqueue し、Worker が BLPOP で受け取る。
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: minitube_redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # MinIO コンテナ
  # HLS ファイル（playlist.m3u8 + segment*.ts）の永続保存先。
  # S3 互換 API（ポート 9000）と Web コンソール（ポート 9001）を提供する。
  # Worker が HLS 変換後に boto3 経由でファイルをアップロードする。
  # Nginx は内部ネットワーク経由で MinIO に直接 proxy_pass する。
  # ----------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: minitube_minio
    environment:
      # MinIO の root 認証情報
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-changeme_minio_secret}
    volumes:
      - minio_data:/data
    ports:
      # S3 API ポート（api/worker/nginx から利用）
      - "9000:9000"
      # Web コンソールポート（ブラウザで http://localhost:9001 からアクセス可能）
      - "9001:9001"
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ----------------------------------------------------------
  # createbuckets コンテナ（初期化のみ）
  # MinIO の起動後に一度だけ実行し、バケットを作成して
  # 匿名ダウンロードポリシーを設定する。
  # Nginx が認証なしで MinIO から HLS ファイルを取得できるようにする。
  #
  # セキュリティ上の注意:
  #   - 匿名ダウンロードはバケット全体に適用される（hls/ プレフィックス下すべて）
  #   - 外部からの直接アクセスは MinIO ポート 9000 をファイアウォールや
  #     ネットワーク設定で遮断することで防ぐこと
  #   - アクセス制御は Nginx の secure_link が担当する
  #   - Compose 内部ネットワーク経由のみ MinIO に到達できる構成が前提
  # ----------------------------------------------------------
  createbuckets:
    image: minio/mc:latest
    container_name: minitube_createbuckets
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-changeme_minio_secret} &&
      mc mb --ignore-existing myminio/${MINIO_BUCKET:-minitube} &&
      mc anonymous set download myminio/${MINIO_BUCKET:-minitube} &&
      exit 0
      "
    restart: "no"

  # ----------------------------------------------------------
  # FastAPI コンテナ
  # ポート 8000 でリッスンし、認証・アップロード・
  # 署名付きURL生成・ジョブ状態参照を担当する。
  # HLS 変換は Worker コンテナに委譲する（ffmpeg は Worker に入れる）。
  # playlist.m3u8 は MinIO から読み込んで署名付きセグメント URL を付与して返す。
  # ----------------------------------------------------------
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: minitube_api
    environment:
      # SECRET_KEY は署名付きURL生成と Nginx の secure_link_md5 で共有する。
      # 本番環境では .env ファイルや Docker secrets を使い、
      # この値を変更すること。
      - SECRET_KEY=${SECRET_KEY:-changeme_replace_in_production}
      # INITIAL_ADMIN_PASSWORD は初回起動時に admin@example.com ユーザに設定するパスワード
      # 再起動時には更新されない（初回のみ有効）。本番環境では必ず変更すること
      - INITIAL_ADMIN_PASSWORD=${INITIAL_ADMIN_PASSWORD:-changeme_admin_password}
      # DATABASE_URL は PostgreSQL への接続文字列
      # db サービスのホスト名・認証情報と一致させること
      - DATABASE_URL=postgresql://${POSTGRES_USER:-minitube}:${POSTGRES_PASSWORD:-changeme_replace_in_production}@db/${POSTGRES_DB:-minitube}
      # REDIS_URL は Redis への接続文字列
      - REDIS_URL=redis://redis:6379/0
      # MinIO 接続情報（playlist.m3u8 の読み込みに使用）
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-http://minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-changeme_minio_secret}
      - MINIO_BUCKET=${MINIO_BUCKET:-minitube}
      # Nginx キャッシュディレクトリ（nginx コンテナと共有ボリューム経由でアクセス）
      - NGINX_CACHE_DIR=${NGINX_CACHE_DIR:-/tmp/nginx/hls_cache}
    volumes:
      # /videos を api コンテナにマウントし、アップロードファイル（input.mp4）の一時保存先とする
      - videos_data:/videos
      # Nginx キャッシュを共有ボリューム経由でマウントし、キャッシュ削除 API を有効にする
      - nginx_cache:/tmp/nginx/hls_cache
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  # ----------------------------------------------------------
  # Worker コンテナ
  # Redis Queue を常時監視し、split ジョブを処理する。
  # ffmpeg による HLS 変換を担当し、変換後に MinIO へアップロードする。
  # ローカルへの恒久保存は行わない（一時ディレクトリのみ使用）。
  # ----------------------------------------------------------
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: minitube_worker
    environment:
      # DATABASE_URL は PostgreSQL への接続文字列
      - DATABASE_URL=postgresql://${POSTGRES_USER:-minitube}:${POSTGRES_PASSWORD:-changeme_replace_in_production}@db/${POSTGRES_DB:-minitube}
      # REDIS_URL は Redis への接続文字列
      - REDIS_URL=redis://redis:6379/0
      # MinIO 接続情報（HLS ファイルのアップロードに使用）
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-http://minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-changeme_minio_secret}
      - MINIO_BUCKET=${MINIO_BUCKET:-minitube}
      # Nginx キャッシュディレクトリ（nginx コンテナと共有ボリューム経由でアクセス）
      - NGINX_CACHE_DIR=${NGINX_CACHE_DIR:-/tmp/nginx/hls_cache}
    volumes:
      # /videos を worker コンテナにマウントし、input.mp4 の読み込み先とする
      - videos_data:/videos
      # Nginx キャッシュを共有ボリューム経由でマウントし、動画差し替え後に古いキャッシュを削除する
      - nginx_cache:/tmp/nginx/hls_cache
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  # ----------------------------------------------------------
  # Nginx コンテナ
  # /videos/ 以下のリクエストを secure_link_md5 で検証した後、
  # MinIO に proxy_pass してセグメントを取得・キャッシュして返す。
  # /api/* は FastAPI にリバースプロキシする。
  #
  # nginx.conf は docker-compose 起動時に envsubst で処理され、
  # ${SECRET_KEY} と ${MINIO_BUCKET} が実際の値に置換される。
  # ----------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: minitube_nginx
    environment:
      # secure_link_md5 の署名検証に使用する秘密鍵。
      # FastAPI と同じ値を設定する必要がある。
      - SECRET_KEY=${SECRET_KEY:-changeme_replace_in_production}
      # MinIO のバケット名（proxy_pass の URI 組み立てに使用）
      - MINIO_BUCKET=${MINIO_BUCKET:-minitube}
    volumes:
      # nginx.conf をテンプレートとしてマウントする
      # コンテナ起動時に envsubst で変数を置換してから nginx を起動する
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf.template:ro
      # Bootstrap を含む静的ファイルを nginx から直接配信する
      - ./api/static:/usr/share/nginx/html/static:ro
      # Nginx キャッシュを共有ボリュームとしてマウントする
      # Worker/API コンテナからも同じパスでアクセスしてキャッシュを削除できる
      - nginx_cache:/tmp/nginx/hls_cache
    ports:
      - "80:80"
    depends_on:
      - api
      - minio
    # コンテナ起動時に以下を実行する:
    #   1. envsubst で ${SECRET_KEY} と ${MINIO_BUCKET} を nginx.conf に埋め込む
    #   2. nginx を起動する
    # proxy_cache 用ディレクトリは nginx_cache ボリュームのマウントにより自動的に存在する
    # '$$SECRET_KEY' / '$$MINIO_BUCKET' の $$ は docker-compose の変数展開を
    # 回避するためのエスケープ。nginx の $uri, $host 等は置換されない。
    command: >
      /bin/sh -c
      "envsubst '$$SECRET_KEY $$MINIO_BUCKET' < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf
      && nginx -g 'daemon off;'"
    restart: unless-stopped

# ----------------------------------------------------------
# ボリューム定義
# videos_data: FastAPI（input.mp4 書き込み）・Worker（input.mp4 読み取り）で共有
#              HLS 生成物は Worker が MinIO に保存するため Nginx には不要
# minio_data:  MinIO が HLS ファイルを永続保存するボリューム
# nginx_cache: Nginx proxy_cache の保存先。nginx / worker / api コンテナで共有し、
#              動画差し替え時に Worker が古いキャッシュを削除できるようにする
# ----------------------------------------------------------
volumes:
  videos_data:
  postgres_data:
  minio_data:
  nginx_cache:
