{% extends "base.html" %}
{% block title %}カテゴリ一覧 - minitube{% endblock %}

{% block content %}
<h1 class="h4 mb-3">カテゴリ一覧</h1>
{% if categories %}
<div class="accordion" id="categoryAccordion">
  {% for category in categories %}
  <div class="accordion-item">
    <h2 class="accordion-header" id="heading-{{ category.id }}">
      <a class="accordion-button collapsed text-decoration-none" href="/categories/{{ category.id }}" style="padding-left: calc(1rem + {{ category.depth }}rem);">
        <span class="me-2">{{ category.display_name }}</span>
        <span class="badge text-bg-secondary ms-auto">{{ category.video_count }}</span>
      </a>
    </h2>
  </div>
  {% endfor %}
</div>
{% else %}
<div class="alert alert-secondary">カテゴリがありません</div>
{% endif %}
{% endblock %}
