{% extends "base.html" %}
{% block title %}アップロード - minitube{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-8 col-lg-6">
    <div class="card bg-body-tertiary">
      <div class="card-body p-4">
        <h1 class="h5 card-title mb-4">動画をアップロード</h1>

        <form
          id="upload-form"
          action="/api/upload"
          method="post"
          enctype="multipart/form-data"
        >
          <!-- ファイル選択エリア -->
          <div
            class="border border-secondary border-2 rounded p-5 text-center mb-3"
            style="border-style: dashed !important; cursor: pointer;"
            onclick="document.getElementById('file-input').click()"
          >
            <div class="fs-1 mb-2">📹</div>
            <p class="text-secondary mb-1">クリックして mp4 ファイルを選択</p>
            <p class="small text-secondary mb-0">対応形式: .mp4</p>
          </div>

          <p id="file-name" class="text-success small mb-3"></p>

          <input
            type="file"
            id="file-input"
            name="file"
            accept="video/mp4,.mp4"
            required
            class="d-none"
            onchange="onFileSelected(this)"
          />

          <!-- 公開設定 -->
          <div class="mb-4">
            <label class="form-label">公開設定</label>
            <div class="d-flex gap-4">
              <div class="form-check">
                <input class="form-check-input" type="radio" name="visibility" value="public" id="vis-public" checked />
                <label class="form-check-label" for="vis-public">公開</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="radio" name="visibility" value="private" id="vis-private" />
                <label class="form-check-label" for="vis-private">非公開</label>
              </div>
            </div>
          </div>

          <button type="submit" id="submit-btn" class="btn btn-danger w-100" disabled>アップロード</button>
          <p id="uploading-msg" class="text-secondary text-center small mt-3 d-none">⏳ アップロード中です。しばらくお待ちください...</p>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  function onFileSelected(input) {
    const fileName = input.files[0] ? input.files[0].name : "";
    document.getElementById("file-name").textContent = fileName ? `選択済み: ${fileName}` : "";
    document.getElementById("submit-btn").disabled = !fileName;
  }

  document.getElementById("upload-form").addEventListener("submit", function () {
    document.getElementById("submit-btn").disabled = true;
    document.getElementById("uploading-msg").classList.remove("d-none");
  });
</script>
{% endblock %}
