<!DOCTYPE html>
<!--
  login.html - ログインページ

  このページは未認証ユーザに対してパスワード入力フォームを表示する。
  フォームの送信先は /api/login (POST) で、
  認証成功後は /upload にリダイレクトされる。

  認証フロー:
    1. ユーザがこのページにアクセスする
    2. パスワードを入力して送信する
    3. /api/login で検証され、Cookie が発行される
    4. /upload にリダイレクトされる
-->
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ログイン - minitube</title>
  <style>
    /* ページ全体を中央揃えにするシンプルなレイアウト */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ログインカードのコンテナ */
    .login-card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
    }

    .login-card h1 {
      font-size: 1.8rem;
      margin-bottom: 8px;
      color: #ff4444;
    }

    .login-card p.subtitle {
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 28px;
    }

    /* エラーメッセージの表示領域 */
    .error-message {
      background: rgba(255, 68, 68, 0.15);
      border: 1px solid #ff4444;
      border-radius: 4px;
      padding: 10px 14px;
      margin-bottom: 20px;
      font-size: 0.9rem;
      color: #ff6666;
    }

    /* フォーム要素のスタイル */
    label {
      display: block;
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 6px;
      margin-top: 18px;
    }

    input[type="password"] {
      width: 100%;
      padding: 10px 14px;
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 4px;
      color: #e0e0e0;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="password"]:focus {
      border-color: #ff4444;
    }

    /* ログインボタン */
    button[type="submit"] {
      width: 100%;
      padding: 12px;
      margin-top: 24px;
      background: #ff4444;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }

    button[type="submit"]:hover {
      background: #cc2222;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>▶ minitube</h1>
    <p class="subtitle">動画配信システム - ログイン</p>

    <!-- パスワード誤り時のエラーメッセージ -->
    {% if error %}
    <div class="error-message">
      パスワードが正しくありません。再度お試しください。
    </div>
    {% endif %}

    <!--
      /api/login に POST する認証フォーム
      method="post" + enctype="application/x-www-form-urlencoded"
      により、FastAPI の Form(...) で受け取れる形式で送信される
    -->
    <form action="/api/login" method="post" enctype="application/x-www-form-urlencoded">
      <label for="password">パスワード</label>
      <input
        type="password"
        id="password"
        name="password"
        placeholder="パスワードを入力"
        required
        autofocus
      />
      <button type="submit">ログイン</button>
    </form>
  </div>
</body>
</html>
