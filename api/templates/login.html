<!DOCTYPE html>
<!--
  login.html - ログインページ

  メールアドレスとパスワードでログインするフォームを表示する。
  フォームの送信先は /api/login (POST)。
  認証成功後は /home にリダイレクトされる。
-->
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ログイン - minitube</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
    }

    .login-card h1 {
      font-size: 1.8rem;
      margin-bottom: 8px;
      color: #ff4444;
    }

    .login-card p.subtitle {
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 28px;
    }

    .error-message {
      background: rgba(255, 68, 68, 0.15);
      border: 1px solid #ff4444;
      border-radius: 4px;
      padding: 10px 14px;
      margin-bottom: 20px;
      font-size: 0.9rem;
      color: #ff6666;
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 6px;
      margin-top: 18px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 10px 14px;
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 4px;
      color: #e0e0e0;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: #ff4444;
    }

    button[type="submit"] {
      width: 100%;
      padding: 12px;
      margin-top: 24px;
      background: #ff4444;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }

    button[type="submit"]:hover {
      background: #cc2222;
    }

    .register-link {
      margin-top: 20px;
      text-align: center;
      font-size: 0.85rem;
      color: #888;
    }

    .register-link a {
      color: #ff4444;
      text-decoration: none;
    }

    .register-link a:hover {
      text-decoration: underline;
    }

    .home-link {
      position: fixed;
      top: 14px;
      right: 32px;
      color: #aaa;
      text-decoration: none;
      font-size: 0.9rem;
      z-index: 10;
    }

    .home-link:hover {
      color: #fff;
    }
  </style>
</head>
<body>
  <a href="/home" class="home-link">ホーム</a>
  <div class="login-card">
    <h1>▶ minitube</h1>
    <p class="subtitle">動画配信システム - ログイン</p>

    {% if error %}
    <div class="error-message">
      メールアドレスまたはパスワードが正しくありません。再度お試しください。
    </div>
    {% endif %}

    <form action="/api/login" method="post" enctype="application/x-www-form-urlencoded">
      <label for="email">メールアドレス</label>
      <input
        type="email"
        id="email"
        name="email"
        placeholder="example@example.com"
        required
        autofocus
      />
      <label for="password">パスワード</label>
      <input
        type="password"
        id="password"
        name="password"
        placeholder="パスワードを入力"
        required
      />
      <button type="submit">ログイン</button>
    </form>

    <p class="register-link">
      アカウントをお持ちでない方は <a href="/register">新規登録</a>
    </p>
  </div>
</body>
</html>
