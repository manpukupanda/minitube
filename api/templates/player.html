<!DOCTYPE html>
<!--
  player.html - 動画プレイヤーページ

  このページは hls.js を使って HLS 形式の動画を再生する。

  再生の仕組み:
    1. ページロード時に /api/videos/{id}/url を呼び出す
    2. FastAPI が署名付き HLS URL（?expires=...&md5=...）を返す
    3. hls.js が署名付き URL を使って Nginx から m3u8 プレイリストを取得する
    4. Nginx が secure_link_md5 で署名を検証し、有効なら ts セグメントを配信する
    5. ブラウザで動画が再生される

  セキュリティの仕組み（secure_link_md5）:
    - 署名は 1 時間有効（expires = 現在時刻 + 3600 秒）
    - 署名なし・期限切れ・改ざんされた URL は Nginx が 403/410 を返す
    - つまり認証済みユーザだけが FastAPI 経由で有効な URL を取得できる

  hls.js について:
    - hls.js は HLS をブラウザのネイティブビデオタグで再生するためのライブラリ
    - Safari は HLS をネイティブサポートするため hls.js は不要だが、
      Chrome / Firefox には必要
    - CDN から読み込む（ローカル開発環境のため）
-->
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }} - minitube</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
    }

    /* ヘッダーバー */
    header {
      background: #1a1a1a;
      border-bottom: 1px solid #333;
      padding: 14px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-size: 1.4rem;
      color: #ff4444;
    }

    header nav a {
      color: #aaa;
      text-decoration: none;
      font-size: 0.9rem;
      margin-left: 20px;
      transition: color 0.2s;
    }

    header nav a:hover {
      color: #fff;
    }

    /* プレイヤーコンテナ */
    .player-container {
      max-width: 960px;
      margin: 40px auto;
      padding: 0 24px;
    }

    /* 動画タイトル */
    h2 {
      font-size: 1.3rem;
      margin-bottom: 20px;
      color: #fff;
    }

    /* 動画プレイヤー本体 */
    video {
      width: 100%;
      max-height: 540px;
      background: #000;
      border-radius: 6px;
      display: block;
    }

    /* ステータスメッセージ（読み込み中・エラー等） */
    #status {
      margin-top: 16px;
      font-size: 0.9rem;
      color: #888;
      min-height: 1.4em;
    }

    #status.error {
      color: #ff6666;
    }

    /* デバッグ情報（開発用） */
    .debug-info {
      margin-top: 24px;
      padding: 14px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 4px;
      font-size: 0.8rem;
      color: #666;
      word-break: break-all;
    }

    .debug-info strong {
      color: #888;
    }

    /* アップロードページへの戻りリンク */
    .back-link {
      display: inline-block;
      margin-top: 24px;
      color: #aaa;
      text-decoration: none;
      font-size: 0.9rem;
    }

    .back-link:hover {
      color: #fff;
    }
  </style>
</head>
<body>
  <!-- ページヘッダー -->
  <header>
    <h1>▶ minitube</h1>
    <nav>
      <a href="/upload">アップロード</a>
      <a href="/logout">ログアウト</a>
    </nav>
  </header>

  <div class="player-container">
    <!-- 動画タイトル -->
    <h2>{{ title }}</h2>

    <!--
      HTML5 video タグ
      hls.js がこの要素に HLS ストリームを接続する
      controls: ブラウザ標準のコントロールバーを表示する
      autoplay:  ページロード後に自動再生する
    -->
    <video id="video-player" controls autoplay></video>

    <!-- 読み込みステータスの表示エリア -->
    <p id="status">⏳ 署名付き URL を取得中...</p>

    <!-- 開発用デバッグ情報（HLS URL を表示する） -->
    <div class="debug-info">
      <strong>動画 ID:</strong> {{ video_id }}<br />
      <strong>HLS URL:</strong> <span id="hls-url">取得中...</span>
    </div>

    <a href="/upload" class="back-link">← アップロード一覧に戻る</a>
  </div>

  <!--
    hls.js の読み込み（CDN）
    hls.js は HLS（HTTP Live Streaming）を Chrome / Firefox で再生するために必要。
    Safari はネイティブで HLS をサポートするため hls.js は不要だが、
    hls.js を使うことでクロスブラウザ対応ができる。

    CDN: https://cdn.jsdelivr.net/npm/hls.js@latest
  -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <script>
    /**
     * プレイヤーの初期化処理
     *
     * 手順:
     *   1. /api/videos/{id}/url を呼び出して署名付き URL を取得する
     *   2. hls.js が利用可能なら hls.js で再生する
     *   3. hls.js が不要（Safari など）なら video.src に直接セットする
     */
    (async function initPlayer() {
      // このページの動画 ID（Jinja2 テンプレートから埋め込まれる）
      const videoId = "{{ video_id }}";
      const videoEl = document.getElementById("video-player");
      const statusEl = document.getElementById("status");
      const hlsUrlEl = document.getElementById("hls-url");

      /**
       * ステータスメッセージを更新する
       * @param {string} message - 表示するメッセージ
       * @param {boolean} isError - エラーメッセージかどうか
       */
      function setStatus(message, isError = false) {
        statusEl.textContent = message;
        statusEl.className = isError ? "error" : "";
      }

      // ステップ 1: FastAPI から署名付き HLS URL を取得する
      // /api/videos/{id}/url エンドポイントが
      // {"url": "/videos/{id}/playlist.m3u8?expires=...&md5=..."} を返す
      let hlsUrl;
      try {
        const response = await fetch(`/api/videos/${videoId}/url`);
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: 署名付き URL の取得に失敗しました`);
        }
        const data = await response.json();
        hlsUrl = data.url;

        // デバッグ用に URL を表示する
        hlsUrlEl.textContent = hlsUrl;
      } catch (err) {
        setStatus(`エラー: ${err.message}`, true);
        return;
      }

      // ステップ 2: hls.js を使って動画を再生する
      if (Hls.isSupported()) {
        /*
         * hls.js が利用可能（Chrome, Firefox など）の場合
         *
         * Hls.loadSource() で m3u8 プレイリストを読み込み、
         * Hls.attachMedia() で video 要素に接続する。
         * ts セグメントの取得は hls.js が自動的に行う。
         */
        const hls = new Hls({
          // デバッグモード（開発用）: 本番では false にすること
          debug: false,
          // セグメントの先読み数（少なめにしてレイテンシを下げる）
          maxBufferLength: 30,
        });

        // HLS プレイリストを読み込む（署名付き URL）
        hls.loadSource(hlsUrl);

        // video 要素に接続する
        hls.attachMedia(videoEl);

        // MANIFEST_PARSED: プレイリストのパース完了イベント
        hls.on(Hls.Events.MANIFEST_PARSED, function () {
          setStatus("▶ 再生中");
          videoEl.play().catch(function (err) {
            // 自動再生がブロックされた場合（ブラウザポリシー）はそのまま表示する
            setStatus("クリックで再生してください");
          });
        });

        // エラーハンドリング
        hls.on(Hls.Events.ERROR, function (event, data) {
          if (data.fatal) {
            switch (data.type) {
              case Hls.ErrorTypes.NETWORK_ERROR:
                // ネットワークエラー: 再接続を試みる
                setStatus("ネットワークエラーが発生しました。再接続中...", true);
                hls.startLoad();
                break;
              case Hls.ErrorTypes.MEDIA_ERROR:
                // メディアエラー: メディア回復を試みる
                setStatus("メディアエラーが発生しました。回復を試みています...", true);
                hls.recoverMediaError();
                break;
              default:
                // 致命的なエラー: 再生を停止する
                setStatus(`再生エラー: ${data.type}`, true);
                hls.destroy();
                break;
            }
          }
        });

      } else if (videoEl.canPlayType("application/vnd.apple.mpegurl")) {
        /*
         * Safari など HLS をネイティブサポートするブラウザの場合
         * video.src に直接 HLS URL をセットするだけで再生できる
         */
        videoEl.src = hlsUrl;
        videoEl.addEventListener("loadedmetadata", function () {
          setStatus("▶ 再生中");
          videoEl.play().catch(function () {
            setStatus("クリックで再生してください");
          });
        });
        videoEl.addEventListener("error", function () {
          setStatus("動画の読み込みに失敗しました", true);
        });

      } else {
        // HLS に対応していないブラウザ
        setStatus("このブラウザは HLS の再生に対応していません", true);
      }
    })();
  </script>
</body>
</html>
