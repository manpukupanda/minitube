# alembic.ini - Alembic マイグレーション設定ファイル
#
# sqlalchemy.url はここでは設定せず、alembic/env.py 内で
# DATABASE_URL 環境変数から動的に取得する。

[alembic]
# マイグレーションスクリプトの配置ディレクトリ
script_location = alembic

# マイグレーションファイルの命名パターン
# 例: 1a2b3c4d5e6f_create_videos_table.py
file_template = %%(rev)s_%%(slug)s

# ロギング設定
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
