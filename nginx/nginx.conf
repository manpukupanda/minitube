# ==============================================================
# Nginx 設定ファイル - minitube HLS 動画配信サーバ
#
# このファイルは docker-compose 起動時に envsubst によって処理される。
# ${SECRET_KEY} と ${MINIO_BUCKET} プレースホルダは環境変数の値に置換される。
# （それ以外の $変数 は Nginx の組み込み変数のため置換されない）
#
# 役割：
#   1. /videos/ 以下の HLS リクエストを secure_link_md5 で署名検証する
#   2. 検証通過後、MinIO へ直接 proxy_pass して .ts / .m3u8 を取得する
#   3. proxy_cache でキャッシュし、MinIO への upstream リクエスト数を削減する
#   4. /api/* のリクエストを FastAPI にリバースプロキシ
#   5. それ以外のリクエストも FastAPI にプロキシ（HTML ページ用）
#
# secure_link_md5 の仕組み：
#   - クライアントが /videos/{id}/segment.ts?expires=TS&md5=SIG を要求
#   - Nginx が md5(expires + uri + SECRET_KEY) を計算し SIG と照合
#   - 一致すれば MinIO からセグメントを取得して返す
#   - 不一致または期限切れなら 403 を返す
#
# proxy_cache キャッシュキー方針：
#   - キャッシュキーを "$uri"（パスのみ）とし、クエリ（expires/md5）を除外する
#   - 同一セグメントは有効期限・署名値が変わっても同一キャッシュヒットとなる
#   - secure_link の検証を通過したリクエストのみキャッシュに到達するため安全
#   - Worker/API が md5(uri) → levels=1:2 でキャッシュファイルパスを逆算して削除できる
# ==============================================================

# ワーカープロセス数（auto = CPU コア数に合わせる）
worker_processes auto;

events {
    # 1ワーカーあたりの最大同時接続数
    worker_connections 1024;
}

http {
    # MIME タイプの読み込み
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ----------------------------------------------------------
    # HLS 配信に必要な MIME タイプを追加で定義する。
    # m3u8 は HLS プレイリスト、ts は MPEG-2 Transport Stream セグメント。
    # ブラウザが hls.js を通じてこれらを正しく解釈するために必須。
    # ----------------------------------------------------------
    types {
        application/vnd.apple.mpegurl  m3u8;
        video/mp2t                     ts;
    }

    # アクセスログの設定
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # ファイル送信の最適化
    sendfile on;

    # HTTP Keep-Alive のタイムアウト設定
    keepalive_timeout 65;

    # ----------------------------------------------------------
    # proxy_cache_path - HLS セグメントのキャッシュ設定
    #
    # /tmp/nginx/hls_cache にキャッシュファイルを保存する。
    # keys_zone=hls_cache:10m : 共有メモリゾーン（キーのインデックス用）
    # max_size=1g             : キャッシュの最大サイズ
    # inactive=1h             : 1 時間アクセスがなければ削除
    # use_temp_path=off       : 一時ファイルを使わず直接書き込む（パフォーマンス向上）
    # ----------------------------------------------------------
    proxy_cache_path /tmp/nginx/hls_cache
                     levels=1:2
                     keys_zone=hls_cache:10m
                     max_size=1g
                     inactive=1h
                     use_temp_path=off;

    server {
        # ポート 80 でリッスンする
        listen 80;
        server_name localhost;

        # ----------------------------------------------------------
        # /videos/{video_id}/{file} - HLS セグメント配信エンドポイント
        #
        # secure_link_md5 による署名検証を行い、
        # 検証通過後に MinIO へ直接 proxy_pass してセグメントを取得する。
        # proxy_cache によりキャッシュが有効であれば MinIO への
        # upstream リクエストをスキップする。
        #
        # URI マッピング:
        #   リクエスト: /videos/{video_id}/segment000.ts
        #   MinIO パス: /${MINIO_BUCKET}/hls/{video_id}/segment000.ts
        #
        # キャッシュキー方針:
        #   "$scheme$proxy_host$uri" を使用し、クエリ（expires/md5）を除外する。
        #   expires/md5 が変わっても同一セグメントは同一キャッシュに載る。
        #   secure_link の検証を通過したリクエストのみここに到達するため、
        #   キャッシュキーからクエリを除外しても安全性は損なわれない。
        #
        # 正規表現 ^/videos/[^/]+/.*\.(ts|m3u8)$ を使用することで、
        # 実際の HLS ファイル（.ts セグメントと .m3u8 プレイリスト）にのみマッチする。
        # /videos/{id}/edit のような HTML ページリクエストはマッチせず、
        # location / 経由で FastAPI に転送される。
        #
        # 注意: ${SECRET_KEY} / ${MINIO_BUCKET} は docker-compose 起動時に
        #       envsubst で実際の値に置換される。
        # ----------------------------------------------------------
        location ~ ^/videos/[^/]+/.*\.(ts|m3u8)$ {
            # secure_link の引数を指定する（md5 署名と有効期限）
            # $arg_md5    : ?md5=... クエリパラメータの値
            # $arg_expires: ?expires=... クエリパラメータの値
            secure_link $arg_md5,$arg_expires;

            # secure_link_md5 の計算式
            # FastAPI 側の署名計算と完全に一致させる必要がある
            # 形式: md5(expires + uri + SECRET_KEY)
            # 注意: $uri にはクエリパラメータが含まれない（パスのみ）
            # ${SECRET_KEY} は envsubst によって実際の値に置換される
            secure_link_md5 "$secure_link_expires${uri}${SECRET_KEY}";

            # 署名が空（md5 パラメータなし、または署名不一致）の場合は 403 Forbidden
            if ($secure_link = "") {
                return 403;
            }

            # 署名は一致するが有効期限切れの場合は 403 Forbidden
            if ($secure_link = "0") {
                return 403;
            }

            # 署名検証通過後: MinIO へ proxy_pass する
            # /videos/{id}/{file} → /${MINIO_BUCKET}/hls/{id}/{file} に書き換えて
            # MinIO（内部ネットワーク http://minio:9000）に転送する
            # ${MINIO_BUCKET} は envsubst によって実際のバケット名に置換される
            rewrite ^/videos/(.+)$ /${MINIO_BUCKET}/hls/$1 break;
            proxy_pass http://minio:9000;

            # MinIO へのリクエストに必要なヘッダ設定
            proxy_set_header Host minio:9000;
            # X-Real-IP / X-Forwarded-For をクリアする:
            # MinIO は匿名ダウンロード許可のため IP ヘッダは不要。
            # クライアント IP は Nginx のアクセスログで確認できる。
            proxy_set_header X-Real-IP "";
            proxy_set_header X-Forwarded-For "";
            # 認証ヘッダをクリア（バケットは匿名ダウンロード許可済み）
            proxy_set_header Authorization "";

        # --------------------------------------------------
            # proxy_cache 設定
            # --------------------------------------------------
            proxy_cache hls_cache;

            # キャッシュキーを $uri のみにする。
            # クエリ（expires/md5）を除外し、同一セグメントは同一キャッシュに載せる。
            # Worker/API 側でも同じキーを MD5 化してキャッシュファイルパスを逆算できる。
            proxy_cache_key "$uri";

            # 200 レスポンスを 1 時間キャッシュする
            proxy_cache_valid 200 1h;

            # upstream エラー時にキャッシュを使用する（stale 許容）
            proxy_cache_use_stale error timeout updating;

            # キャッシュのヒット状態をレスポンスヘッダで確認できるようにする
            # （MISS / HIT / EXPIRED 等で確認可能）
            add_header X-Cache-Status $upstream_cache_status;

            # HLS の CORS 設定
            add_header Access-Control-Allow-Origin $host;
            # HLS セグメントはブラウザキャッシュしない（Nginx キャッシュは有効）
            add_header Cache-Control no-cache;
        }

        # ----------------------------------------------------------
        # /thumbnails/ - サムネイル画像の配信
        #
        # MinIO に保存されたサムネイル（videos/{video_id}/thumbnails/{id}.jpg）を
        # Nginx 経由で配信する。
        # URL: /thumbnails/{video_id}/{thumbnail_id}.jpg
        # MinIO: /${MINIO_BUCKET}/videos/{video_id}/thumbnails/{thumbnail_id}.jpg
        # ${MINIO_BUCKET} は envsubst によって実際のバケット名に置換される。
        # ----------------------------------------------------------
        location ^~ /thumbnails/ {
            rewrite ^/thumbnails/([^/]+)/(.+)$ /${MINIO_BUCKET}/videos/$1/thumbnails/$2 break;
            proxy_pass http://minio:9000;

            proxy_set_header Host minio:9000;
            proxy_set_header X-Real-IP "";
            proxy_set_header X-Forwarded-For "";
            proxy_set_header Authorization "";
        }

        # ----------------------------------------------------------
        # /user-icons/ - ユーザアイコン画像の配信
        #
        # MinIO に保存されたユーザアイコン（user-icons/{user_id}.{ext}）を
        # Nginx 経由で配信する。
        # ${MINIO_BUCKET} は envsubst によって実際のバケット名に置換される。
        # ----------------------------------------------------------
        location ^~ /user-icons/ {
            rewrite ^/user-icons/(.+)$ /${MINIO_BUCKET}/user-icons/$1 break;
            proxy_pass http://minio:9000;

            proxy_set_header Host minio:9000;
            proxy_set_header X-Real-IP "";
            proxy_set_header X-Forwarded-For "";
            proxy_set_header Authorization "";
        }

        # ----------------------------------------------------------
        # /hero-images/ - ホーム画面ヒーロー画像の配信
        #
        # MinIO に保存されたヒーロー画像（hero-images/{id}.{ext}）を
        # Nginx 経由で配信する。
        # ${MINIO_BUCKET} は envsubst によって実際のバケット名に置換される。
        # ----------------------------------------------------------
        location ^~ /hero-images/ {
            rewrite ^/hero-images/(.+)$ /${MINIO_BUCKET}/hero-images/$1 break;
            proxy_pass http://minio:9000;

            proxy_set_header Host minio:9000;
            proxy_set_header X-Real-IP "";
            proxy_set_header X-Forwarded-For "";
            proxy_set_header Authorization "";
        }

        # ----------------------------------------------------------
        # /static/ - nginx による静的アセット配信（Bootstrap 等）
        # ----------------------------------------------------------
        location ^~ /static/ {
            alias /usr/share/nginx/html/static/;
            add_header Cache-Control "public, max-age=86400";
            expires 1d;
            access_log off;
        }

        # ----------------------------------------------------------
        # /api/ - FastAPI へのリバースプロキシ
        #
        # アップロード・ログイン・署名URL生成などの API を
        # FastAPI コンテナ（api:8000）に転送する。
        #
        # ^~ 修飾子により、このプレフィックスが最長一致した場合は
        # 正規表現 location のテストをスキップし、必ず FastAPI に転送する。
        # これにより HLS 用正規表現 location が /api/... リクエストを
        # 奪うことを防ぐ。
        # ----------------------------------------------------------
        location ^~ /api/ {
            proxy_pass         http://api:8000;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

            # 動画アップロード用に最大ボディサイズを設定（2GB）
            client_max_body_size 2048m;

            # ffmpeg 変換に時間がかかるためタイムアウトを延長する
            proxy_read_timeout    300s;
            proxy_connect_timeout 60s;
            proxy_send_timeout    300s;
        }

        # ----------------------------------------------------------
        # その他すべてのリクエスト - FastAPI へのリバースプロキシ
        #
        # /login, /player/{id}, /upload などの HTML ページを
        # FastAPI コンテナが返すため、すべて転送する。
        # ----------------------------------------------------------
        location / {
            proxy_pass         http://api:8000;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

            # アップロードページ経由のリクエストにも対応するため
            client_max_body_size 2048m;
        }
    }
}
