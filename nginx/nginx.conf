# ==============================================================
# Nginx 設定ファイル - minitube HLS 動画配信サーバ
#
# このファイルは docker-compose 起動時に envsubst によって処理される。
# ${SECRET_KEY} プレースホルダは環境変数 SECRET_KEY の値に置換される。
# （それ以外の $変数 は Nginx の組み込み変数のため置換されない）
#
# 役割：
#   1. /videos/ 以下の HLS ファイルを secure_link_md5 で署名検証して配信
#   2. /api/* のリクエストを FastAPI にリバースプロキシ
#   3. それ以外のリクエストも FastAPI にプロキシ（HTML ページ用）
#
# secure_link_md5 の仕組み：
#   - クライアントが /videos/{id}/playlist.m3u8?expires=TS&md5=SIG を要求
#   - Nginx が md5(expires + uri + SECRET_KEY) を計算し SIG と照合
#   - 一致すれば配信、不一致なら 403 を返す
#   - expires が現在時刻を過ぎていれば 403 を返す
# ==============================================================

# ワーカープロセス数（auto = CPU コア数に合わせる）
worker_processes auto;

events {
    # 1ワーカーあたりの最大同時接続数
    worker_connections 1024;
}

http {
    # MIME タイプの読み込み
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ----------------------------------------------------------
    # HLS 配信に必要な MIME タイプを追加で定義する。
    # m3u8 は HLS プレイリスト、ts は MPEG-2 Transport Stream セグメント。
    # ブラウザが hls.js を通じてこれらを正しく解釈するために必須。
    # ----------------------------------------------------------
    types {
        application/vnd.apple.mpegurl  m3u8;
        video/mp2t                     ts;
    }

    # アクセスログの設定
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # ファイル送信の最適化（sendfile は HLS の ts ファイル配信に有効）
    sendfile on;

    # HTTP Keep-Alive のタイムアウト設定
    keepalive_timeout 65;

    server {
        # ポート 80 でリッスンする
        listen 80;
        server_name localhost;

        # ----------------------------------------------------------
        # /videos/ - HLS ファイルの配信エンドポイント
        #
        # secure_link_md5 による署名検証を行い、
        # 有効なリクエストのみ /videos/ ディレクトリのファイルを返す。
        #
        # 署名検証の流れ：
        #   1. クライアントが ?expires=TS&md5=SIG 付きURLを要求
        #   2. Nginx が md5("TS/path/to/file.m3u8SECRET_VALUE") を計算
        #   3. SIG と一致し、expires が未来であれば 200 を返す
        #   4. 不一致または期限切れなら 403 を返す
        #
        # 注意: ${SECRET_KEY} は docker-compose 起動時に envsubst で
        #       実際のシークレット値に置換される。
        # ----------------------------------------------------------
        location /videos/ {
            # secure_link の引数を指定する（md5 署名と有効期限）
            # $arg_md5    : ?md5=... クエリパラメータの値
            # $arg_expires: ?expires=... クエリパラメータの値
            secure_link $arg_md5,$arg_expires;

            # secure_link_md5 の計算式
            # FastAPI 側の generate_signed_url() と完全に一致させる必要がある
            # 形式: md5(expires + uri + SECRET_KEY)
            # 例:  md5("1712345678/videos/123/playlist.m3u8mysecret")
            # 注意: $uri にはクエリパラメータが含まれない（パスのみ）
            # ${SECRET_KEY} は envsubst によって実際の値に置換される
            secure_link_md5 "$secure_link_expires$uri${SECRET_KEY}";

            # 署名が空（md5 パラメータなし、または署名不一致）の場合は 403 Forbidden
            if ($secure_link = "") {
                return 403;
            }

            # 署名は一致するが有効期限切れの場合は 403 Forbidden
            if ($secure_link = "0") {
                return 403;
            }

            # 署名検証が通ったリクエストのみここに到達する
            # root / に設定することで /videos/... → /videos/... にマッピングされる
            root /;

            # HLS の CORS 設定（hls.js がブラウザから直接アクセスするために必要）
            add_header Access-Control-Allow-Origin *;
            # HLS セグメントはキャッシュしない（リアルタイム性のため）
            add_header Cache-Control no-cache;
        }

        # ----------------------------------------------------------
        # /api/ - FastAPI へのリバースプロキシ
        #
        # アップロード・ログイン・署名URL生成などの API を
        # FastAPI コンテナ（api:8000）に転送する。
        # ----------------------------------------------------------
        location /api/ {
            proxy_pass         http://api:8000;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

            # 動画アップロード用に最大ボディサイズを設定（2GB）
            client_max_body_size 2048m;

            # ffmpeg 変換に時間がかかるためタイムアウトを延長する
            proxy_read_timeout    300s;
            proxy_connect_timeout 60s;
            proxy_send_timeout    300s;
        }

        # ----------------------------------------------------------
        # その他すべてのリクエスト - FastAPI へのリバースプロキシ
        #
        # /login, /player/{id}, /upload などの HTML ページを
        # FastAPI コンテナが返すため、すべて転送する。
        # ----------------------------------------------------------
        location / {
            proxy_pass         http://api:8000;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

            # アップロードページ経由のリクエストにも対応するため
            client_max_body_size 2048m;
        }
    }
}
